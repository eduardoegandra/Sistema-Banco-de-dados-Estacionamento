{% extends "base.html" %}
{% block title %}Novo Veículo{% endblock %}
{% block content %}
<h1 class="mb-4">Novo Veículo</h1>

<div class="card">
    <div class="card-body">
        <form method="post">
            <div class="mb-3">
                <label class="form-label">Cliente (proprietário)</label>
                <select class="form-select" name="cliente_id" required>
                    <option value="">Selecione...</option>
                    {% for cliente in clientes %}
                    <option value="{{ cliente.id }}">{{ cliente.nome }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Modelo</label>
                <input type="text" class="form-control" name="modelo" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Placa</label>
                <input type="text" class="form-control" name="placa" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Tipo de Veículo</label>
                <select class="form-select" name="tipo_veiculo_id" required>
                    {% for tipo in tipos_veiculo %}
                    <option value="{{ tipo.id }}">{{ tipo.descricao }}</option>
                    {% endfor %}
                </select>
            </div>
            <button type="submit" class="btn btn-primary">Cadastrar</button>
            <a href="{{ url_for('veiculos') }}" class="btn btn-outline-secondary">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
